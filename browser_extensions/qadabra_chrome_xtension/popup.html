<!DOCTYPE html>
<html>
<head>
  <title>Qadabra</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      width: 520px;
      height: 600px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      flex-direction: column;
      background: #111;
      color: #eee;
    }
    /* Invisible hit target so the env UI can be unlocked without a visible chrome. */
    #env-reveal {
      height: 4px;
      flex-shrink: 0;
      cursor: default;
      background: transparent;
    }
    #env-bar {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      background: #1a1a1a;
      border-bottom: 1px solid #333;
      flex-shrink: 0;
      font-size: 12px;
    }
    #env-bar.visible {
      display: flex;
    }
    #env-bar .label {
      color: #999;
      margin-right: 4px;
    }
    #env-bar button {
      border: 1px solid #444;
      background: #222;
      color: #ccc;
      border-radius: 999px;
      padding: 3px 10px;
      cursor: pointer;
      font-size: 12px;
    }
    #env-bar button.active {
      background: #2563eb;
      border-color: #2563eb;
      color: #fff;
    }
    #env-bar button.active[data-env="prod"] {
      background: #e36159;
      border-color: #e36159;
    }
    #env-bar .hint {
      margin-left: auto;
      color: #777;
      font-size: 11px;
    }
    #app-frame {
      border: none;
      width: 100%;
      flex: 1;
      display: block;
      background: #fff;
    }
  </style>
</head>
<body>
  <div id="env-reveal" title="" aria-hidden="true"></div>
  <div id="env-bar">
    <span class="label">Env</span>
    <button type="button" data-env="prod" id="env-prod">Prod</button>
    <button type="button" data-env="local" id="env-local">Local</button>
    <span class="hint" id="env-hint"></span>
  </div>
  <iframe id="app-frame" title="Qadabra"></iframe>
  <script src="env.js"></script>
  <script src="popup.js"></script>
</body>
</html>
